<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔢 Đếm Và Nối – Nhóm Có 9 Phương Tiện</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --sky1: #74C7EC;
  --sky2: #A8DADC;
  --grass: #5DBB63;
  --sun: #FFD600;
  --card-r: #FF6B6B;
  --card-t: #00B4D8;
  --card-y: #F4A261;
  --white: #FFFFFF;
  --shadow: rgba(0,0,0,0.15);
  --font: 'Baloo 2', cursive;
}

body {
  font-family: var(--font);
  background: linear-gradient(180deg, #74C7EC 0%, #ADE8F4 50%, #90E0A0 85%, #5DBB63 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== BACKGROUND DECOR ===== */
.bg-sun {
  position: fixed; top: 18px; right: 30px;
  width: 90px; height: 90px;
  background: radial-gradient(circle, #FFE033 40%, #FFD600 70%);
  border-radius: 50%;
  box-shadow: 0 0 0 12px #FFD60040, 0 0 0 24px #FFD60020;
  animation: sunPulse 4s ease-in-out infinite;
  z-index: 0;
}
@keyframes sunPulse { 0%,100%{box-shadow:0 0 0 12px #FFD60040,0 0 0 24px #FFD60020;} 50%{box-shadow:0 0 0 18px #FFD60050,0 0 0 34px #FFD60025;} }

.cloud {
  position: fixed; z-index: 0;
  pointer-events: none;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift { from{transform:translateX(-250px);} to{transform:translateX(110vw);} }

.road {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 52px; background: #555; z-index: 1;
}
.road::after {
  content: '';
  position: absolute; top: 50%; left: 0; right: 0; height: 5px;
  background: repeating-linear-gradient(90deg,#FFD600 0 48px,transparent 48px 96px);
  transform: translateY(-50%);
}

/* ===== MAIN APP ===== */
#app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 10px 70px;
  gap: 10px;
  min-height: 100vh;
}

/* ===== TOP BAR ===== */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 780px;
}
.round-tag {
  background: white; border-radius: 20px; padding: 5px 18px;
  font-size: 15px; font-weight: 700; color: #444;
  box-shadow: 0 3px 10px var(--shadow);
  border: 3px solid #FFD600;
}
.stars-bar {
  display: flex; gap: 5px;
}
.star-icon { font-size: 22px; filter: grayscale(1) opacity(.4); transition: all .3s; }
.star-icon.lit { filter: none; animation: starPop .4s; }
@keyframes starPop { 0%{transform:scale(0);} 70%{transform:scale(1.3);} 100%{transform:scale(1);} }

/* ===== QUESTION BOX ===== */
.question-box {
  background: white; border-radius: 24px;
  padding: 12px 20px;
  width: 100%; max-width: 700px;
  box-shadow: 0 5px 20px var(--shadow);
  border: 4px solid #FF6B6B;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  text-align: center;
}
.question-text {
  font-size: clamp(15px, 3.2vw, 22px);
  font-weight: 800; color: #D62828; line-height: 1.3;
}
.listen-btn {
  flex-shrink: 0; width: 44px; height: 44px;
  background: linear-gradient(135deg,#FF8C42,#FFD600);
  border: none; border-radius: 50%; cursor: pointer;
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px #FF8C4240;
  animation: listenBounce 2s ease-in-out infinite;
  transition: transform .15s;
}
.listen-btn:hover { transform: scale(1.15); }
@keyframes listenBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }

/* ===== TARGET NUMBER ===== */
.target-section { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.target-hint {
  font-size: 14px; font-weight: 700; color: #555;
  background: white; border-radius: 14px; padding: 3px 14px;
  box-shadow: 0 2px 8px var(--shadow);
}
.target-ring {
  width: 120px; height: 120px;
  background: linear-gradient(135deg, #FF6B6B, #FF8C42, #FFD600);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 7px white, 0 0 0 12px #FF8C4240, 0 8px 28px #FF6B6B60;
  position: relative; z-index: 20;
  transition: transform .2s, box-shadow .2s;
}
.target-ring.drop-ready {
  transform: scale(1.1);
  box-shadow: 0 0 0 8px white, 0 0 0 16px #00CC6640, 0 10px 40px #00CC6660;
  background: linear-gradient(135deg,#00CC66,#00B060);
}
.target-ring.pulse-correct { animation: pulseCorrect .6s; }
@keyframes pulseCorrect {
  0%{background:linear-gradient(135deg,#00CC66,#00B060);}
  60%{box-shadow:0 0 0 14px white, 0 0 0 22px #00CC6680, 0 12px 50px #00CC6699;}
  100%{background:linear-gradient(135deg,#FF6B6B,#FF8C42,#FFD600);}
}
.target-number {
  font-size: 68px; font-weight: 900; color: white;
  text-shadow: 0 3px 8px rgba(0,0,0,.3);
  line-height: 1;
}

/* ===== GROUPS ===== */
.groups-container {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 12px; width: 100%; max-width: 800px;
}

.vehicle-group {
  flex: 1 1 220px; max-width: 250px;
  background: white; border-radius: 22px;
  padding: 12px 12px 14px;
  border: 5px solid transparent;
  box-shadow: 0 5px 20px var(--shadow);
  cursor: grab;
  transition: transform .15s, box-shadow .15s, opacity .2s;
  position: relative; touch-action: none;
}
.vehicle-group:active { cursor: grabbing; }
.vehicle-group.dragging-src { opacity: .55; }
.vehicle-group.wrong-shake { animation: wrongShake .45s; }
@keyframes wrongShake {
  0%,100%{transform:translateX(0);}
  15%{transform:translateX(-10px);}
  30%{transform:translateX(10px);}
  45%{transform:translateX(-8px);}
  60%{transform:translateX(8px);}
  75%{transform:translateX(-5px);}
  90%{transform:translateX(5px);}
}
.vehicle-group.correct-glow {
  box-shadow: 0 0 0 4px white, 0 0 0 8px #00CC66, 0 8px 28px #00CC6660;
}
.vehicle-group[data-color="red"]    { border-color: #FF6B6B; background: #FFF3F3; }
.vehicle-group[data-color="blue"]   { border-color: #00B4D8; background: #F0FBFF; }
.vehicle-group[data-color="orange"] { border-color: #F4A261; background: #FFFAF3; }

.group-header {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px;
}
.group-name {
  font-size: 18px; font-weight: 800; color: #333;
}

.vehicles-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.v-item {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px, 4vw, 30px);
  border-radius: 10px;
  background: rgba(0,0,0,.04);
  cursor: pointer;
  transition: transform .12s, background .15s;
  position: relative;
}
.v-item:hover { transform: scale(1.18); background: rgba(0,0,0,.09); }
.v-item.tapped { background: #e8fff2; }
.v-item .count-label {
  position: absolute; top: -4px; right: -4px;
  width: 18px; height: 18px;
  background: #FF6B6B; color: white;
  font-size: 10px; font-weight: 900;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
  display: none;
}
.v-item.tapped .count-label { display: flex; }

/* ===== DRAG GHOST ===== */
#dragGhost {
  position: fixed; z-index: 200; pointer-events: none;
  background: white; border-radius: 18px; padding: 8px 14px;
  box-shadow: 0 10px 36px rgba(0,0,0,.25);
  font-size: 28px; font-weight: 800; color: #333;
  transform: translate(-50%, -50%) rotate(3deg);
  opacity: 0; transition: opacity .1s;
  white-space: nowrap;
  border: 3px solid #FF8C42;
}
#dragGhost.visible { opacity: 1; }

/* ===== FEEDBACK ===== */
#feedback {
  min-height: 50px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 800;
  padding: 0 12px;
  border-radius: 18px;
  transition: all .3s;
}
#feedback.correct {
  background: #D4EDDA; color: #1A6B35;
  border: 3px solid #28A745;
  animation: feedbackPop .4s;
}
#feedback.wrong {
  background: #FDECEA; color: #C0392B;
  border: 3px solid #E74C3C;
  animation: feedbackWiggle .4s;
}
@keyframes feedbackPop { 0%{transform:scale(.8);} 70%{transform:scale(1.05);} 100%{transform:scale(1);} }
@keyframes feedbackWiggle { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-2deg);} 75%{transform:rotate(2deg);} }

/* ===== BUTTONS ===== */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.btn {
  font-family: var(--font);
  font-size: clamp(14px, 3vw, 17px); font-weight: 800;
  border: none; border-radius: 50px; padding: 11px 26px;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 5px 16px rgba(0,0,0,.18);
}
.btn:hover:not(:disabled) { transform: translateY(-3px); }
.btn:active:not(:disabled) { transform: translateY(-1px); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-next    { background: linear-gradient(135deg,#FF8C42,#FF5733); color: white; }
.btn-reset   { background: linear-gradient(135deg,#00B4D8,#0077B6); color: white; }
.btn-listen  { background: linear-gradient(135deg,#F4A261,#E76F51); color: white; }

/* ===== PARTICLES / EFFECTS ===== */
#effects { position: fixed; inset: 0; pointer-events: none; z-index: 80; overflow: hidden; }
.particle {
  position: absolute;
  font-size: clamp(20px, 4vw, 32px);
  animation: particleRise 1.6s ease-out forwards;
}
@keyframes particleRise {
  0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--dx,0px), -200px) scale(.3) rotate(var(--rot,360deg)); }
}
.road-car {
  position: fixed; bottom: 6px; z-index: 90;
  font-size: 46px; pointer-events: none;
  animation: roadCarRun linear forwards;
}
@keyframes roadCarRun { from{left:-80px;} to{left:110vw;} }

/* ===== PROGRESS BAR ===== */
.progress-wrap {
  width: 100%; max-width: 700px;
  background: rgba(255,255,255,.5); border-radius: 10px;
  height: 8px; overflow: hidden;
}
.progress-bar {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg,#FF6B6B,#FFD600,#00CC66);
  transition: width .5s ease;
}

/* ===== OVERLAY ===== */
#overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
#overlay.show { opacity: 1; pointer-events: all; }
.overlay-card {
  background: white; border-radius: 32px;
  padding: 36px 40px; text-align: center;
  max-width: 420px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  animation: cardIn .4s;
}
@keyframes cardIn { from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }
.overlay-emoji { font-size: 64px; margin-bottom: 12px; }
.overlay-title { font-size: 28px; font-weight: 900; color: #333; margin-bottom: 8px; }
.overlay-msg { font-size: 17px; color: #666; margin-bottom: 24px; line-height: 1.5; }
</style>
</head>
<body>

<div class="bg-sun"></div>

<div class="cloud" style="top:25px;animation-duration:20s;animation-delay:-3s;">
  <svg width="130" height="55"><ellipse cx="65" cy="40" rx="60" ry="18" fill="white" opacity=".95"/><ellipse cx="45" cy="30" rx="28" ry="22" fill="white" opacity=".95"/><ellipse cx="82" cy="28" rx="24" ry="19" fill="white" opacity=".95"/></svg>
</div>
<div class="cloud" style="top:65px;animation-duration:28s;animation-delay:-14s;">
  <svg width="100" height="45"><ellipse cx="50" cy="32" rx="45" ry="14" fill="white" opacity=".9"/><ellipse cx="34" cy="24" rx="20" ry="16" fill="white" opacity=".9"/><ellipse cx="64" cy="22" rx="18" ry="14" fill="white" opacity=".9"/></svg>
</div>
<div class="cloud" style="top:10px;animation-duration:34s;animation-delay:-20s;">
  <svg width="80" height="38"><ellipse cx="40" cy="28" rx="36" ry="12" fill="white" opacity=".85"/><ellipse cx="25" cy="20" rx="16" ry="13" fill="white" opacity=".85"/><ellipse cx="55" cy="18" rx="14" ry="12" fill="white" opacity=".85"/></svg>
</div>

<div class="road"></div>
<div id="effects"></div>

<div id="dragGhost">🚗 × 9</div>

<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-emoji" id="overlayEmoji">🎉</div>
    <div class="overlay-title" id="overlayTitle">Tuyệt vời!</div>
    <div class="overlay-msg" id="overlayMsg">Con đã hoàn thành tất cả các vòng!</div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-reset" onclick="resetAll()">🔄 Chơi lại từ đầu</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="round-tag" id="roundTag">Vòng 1 / 3</div>
    <div class="stars-bar" id="starsBar">
      <span class="star-icon" id="star0">⭐</span>
      <span class="star-icon" id="star1">⭐</span>
      <span class="star-icon" id="star2">⭐</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="question-box">
    <div class="question-text">👉 Nhóm phương tiện nào có số lượng là <span style="color:#FF6B6B">9</span>?</div>
    <button class="listen-btn" onclick="playCauHoi()" title="Nghe lại câu hỏi">🔊</button>
  </div>

  <div class="target-section">
    <div class="target-hint">⬇️ Kéo nhóm đúng vào số 9 này ⬇️</div>
    <div class="target-ring" id="targetRing">
      <div class="target-number">9</div>
    </div>
  </div>

  <div class="groups-container" id="groupsContainer"></div>

  <div id="feedback"></div>

  <div class="btn-row">
    <button class="btn btn-listen" onclick="playCauHoi()">🔊 Nghe lại</button>
    <button class="btn btn-next" id="btnNext" onclick="nextRound()" disabled>➡️ Chơi tiếp</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 Chơi lại</button>
  </div>
</div>

<script>
// ============================================================
//  AUDIO CỦA BẠN (Cần đặt chung thư mục với file HTML)
// ============================================================
const audioCauHoi = new Audio('cau-hoi.mp3.mp3');
const audioDungRoi = new Audio('dung-roi.mp3.mp3');
const audioSaiRoi = new Audio('sai-roi.mp3.mp3');
const audioHoanThanh = new Audio('hoan-thanh.mp3.mp3');

function stopAllAudio() {
  audioCauHoi.pause(); audioCauHoi.currentTime = 0;
  audioDungRoi.pause(); audioDungRoi.currentTime = 0;
  audioSaiRoi.pause(); audioSaiRoi.currentTime = 0;
  audioHoanThanh.pause(); audioHoanThanh.currentTime = 0;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function playCauHoi() {
  stopAllAudio();
  audioCauHoi.play().catch(e => console.log('Chưa bấm vào trang:', e));
}

function speakNumber(n, total) {
  if (!window.speechSynthesis) return;
  stopAllAudio();
  const u = new SpeechSynthesisUtterance(n === total ? `${n}. Có ${total} phương tiện!` : String(n));
  u.lang = 'vi-VN'; u.rate = 0.9; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// ============================================================
//  DATA
// ============================================================
const ROUNDS = [
  {
    groups: [
      { emoji: '🚲', name: 'Xe đạp' },
      { emoji: '🏍️', name: 'Xe máy' },
      { emoji: '🚗', name: 'Ô tô'   },
    ]
  },
  {
    groups: [
      { emoji: '🚗', name: 'Ô tô'    },
      { emoji: '🚚', name: 'Xe tải'  },
      { emoji: '🚌', name: 'Xe buýt' },
    ]
  },
  {
    groups: [
      { emoji: '🏍️', name: 'Xe máy'  },
      { emoji: '🚲', name: 'Xe đạp'  },
      { emoji: '🚌', name: 'Xe buýt' },
    ]
  }
];
const COUNTS = [7, 8, 9];
const COLORS = ['red', 'blue', 'orange'];
const CORRECT_COUNT = 9;

// ============================================================
//  STATE
// ============================================================
let currentRound = 0;
let roundSolved = false;
let roundData = null;   
let tapCounters = {};   
let starsEarned = 0;
let dragSourceIdx = null;
let isTouchDrag = false;
let ghostEl = document.getElementById('dragGhost');
let countingIndex = -1;
let countTimeout = null;

// ============================================================
//  INIT
// ============================================================
function initRound() {
  roundSolved = false;
  tapCounters = {};
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('btnNext').disabled = true;
  document.getElementById('targetRing').className = 'target-ring';

  const round = ROUNDS[currentRound];
  const shuffledCounts = shuffle([...COUNTS]);
  const shuffledColors = shuffle([...COLORS]);

  roundData = round.groups.map((g, i) => ({
    ...g,
    count: shuffledCounts[i],
    color: shuffledColors[i],
    index: i
  }));

  document.getElementById('roundTag').textContent = `Vòng ${currentRound + 1} / ${ROUNDS.length}`;
  document.getElementById('progressBar').style.width = `${(currentRound / ROUNDS.length) * 100}%`;

  renderGroups();
  
  playCauHoi(); 
}

// ============================================================
//  RENDER
// ============================================================
function renderGroups() {
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';

  roundData.forEach((g, idx) => {
    const card = document.createElement('div');
    card.className = 'vehicle-group';
    card.setAttribute('data-color', g.color);
    card.setAttribute('data-idx', idx);
    card.setAttribute('draggable', 'true');

    // Header
    const header = document.createElement('div');
    header.className = 'group-header';
    const nameEl = document.createElement('div');
    nameEl.className = 'group-name';
    nameEl.textContent = `${g.emoji} ${g.name}`;
    
    // Đã xóa phần hiển thị huy hiệu đếm "Có ..." ở đây
    
    header.appendChild(nameEl);
    card.appendChild(header);

    // Grid of vehicles
    const grid = document.createElement('div');
    grid.className = 'vehicles-grid';
    tapCounters[idx] = 0;

    for (let i = 0; i < g.count; i++) {
      const item = document.createElement('div');
      item.className = 'v-item';
      item.textContent = g.emoji;

      const label = document.createElement('span');
      label.className = 'count-label';
      item.appendChild(label);

      const vehicleNum = i + 1;
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        onVehicleTap(idx, vehicleNum, item, g.count);
      });
      item.addEventListener('touchstart', (e) => {
        e.stopPropagation();
      }, { passive: true });

      grid.appendChild(item);
    }
    card.appendChild(grid);

    // Drag events (mouse)
    card.addEventListener('dragstart', (e) => onDragStart(e, idx));
    card.addEventListener('dragend', onDragEnd);

    // Touch drag
    card.addEventListener('touchstart', (e) => onTouchStart(e, idx), { passive: false });
    card.addEventListener('touchmove', onTouchMove, { passive: false });
    card.addEventListener('touchend', (e) => onTouchEnd(e, idx));

    container.appendChild(card);
  });

  // Target drop zone (mouse)
  const target = document.getElementById('targetRing');
  target.ondragover = (e) => { e.preventDefault(); target.classList.add('drop-ready'); };
  target.ondragleave = () => target.classList.remove('drop-ready');
  target.ondrop = (e) => { e.preventDefault(); target.classList.remove('drop-ready'); onDrop(); };
}

// ============================================================
//  VEHICLE TAP / COUNTING
// ============================================================
function onVehicleTap(groupIdx, vehicleNum, itemEl, total) {
  clearTimeout(countTimeout);

  if (tapCounters[groupIdx] !== vehicleNum - 1) {
    const grid = itemEl.parentElement;
    resetGroupCount(grid, groupIdx);
    if (vehicleNum !== 1) return;
  }

  tapCounters[groupIdx] = vehicleNum;
  itemEl.classList.add('tapped');
  const label = itemEl.querySelector('.count-label');
  if (label) label.textContent = vehicleNum;

  speakNumber(vehicleNum, total);

  if (vehicleNum === total) {
    countTimeout = setTimeout(() => {
      const grid = itemEl.parentElement;
      resetGroupCount(grid, groupIdx);
    }, 2000);
  }
}

function resetGroupCount(grid, groupIdx) {
  tapCounters[groupIdx] = 0;
  grid.querySelectorAll('.v-item').forEach(el => {
    el.classList.remove('tapped');
  });
}

// ============================================================
//  DRAG (MOUSE)
// ============================================================
function onDragStart(e, idx) {
  dragSourceIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  const g = roundData[idx];
  ghostEl.textContent = `${g.emoji} ${g.name}`;
  setTimeout(() => {
    e.target.classList.add('dragging-src');
  }, 0);
}
function onDragEnd(e) {
  e.target.classList.remove('dragging-src');
  document.getElementById('targetRing').classList.remove('drop-ready');
}

// ============================================================
//  DRAG (TOUCH)
// ============================================================
let touchDragIdx = null;
let touchDragActive = false;

function onTouchStart(e, idx) {
  if (roundSolved) return;
  const touch = e.touches[0];
  touchDragIdx = idx;
  touchDragActive = false;
  ghostEl.style.left = touch.clientX + 'px';
  ghostEl.style.top = touch.clientY + 'px';
}
function onTouchMove(e) {
  if (touchDragIdx === null) return;
  e.preventDefault();
  const touch = e.touches[0];
  if (!touchDragActive) {
    touchDragActive = true;
    const g = roundData[touchDragIdx];
    ghostEl.textContent = `${g.emoji} ${g.name}`;
    ghostEl.classList.add('visible');
    const cards = document.querySelectorAll('.vehicle-group');
    cards[touchDragIdx]?.classList.add('dragging-src');
  }
  ghostEl.style.left = touch.clientX + 'px';
  ghostEl.style.top = touch.clientY + 'px';

  const target = document.getElementById('targetRing');
  const rect = target.getBoundingClientRect();
  const over = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top  && touch.clientY <= rect.bottom;
  target.classList.toggle('drop-ready', over);
}
function onTouchEnd(e, idx) {
  ghostEl.classList.remove('visible');
  const cards = document.querySelectorAll('.vehicle-group');
  cards.forEach(c => c.classList.remove('dragging-src'));

  const target = document.getElementById('targetRing');
  target.classList.remove('drop-ready');

  if (!touchDragActive) { touchDragIdx = null; return; }

  const touch = e.changedTouches[0];
  const rect = target.getBoundingClientRect();
  const dropped = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                  touch.clientY >= rect.top  && touch.clientY <= rect.bottom;

  if (dropped) {
    dragSourceIdx = touchDragIdx;
    onDrop();
  }
  touchDragIdx = null;
  touchDragActive = false;
}

// ============================================================
//  DROP LOGIC
// ============================================================
function onDrop() {
  if (dragSourceIdx === null || roundSolved) return;
  const g = roundData[dragSourceIdx];

  if (g.count === CORRECT_COUNT) {
    handleCorrect(dragSourceIdx);
  } else {
    handleWrong(dragSourceIdx);
  }
  dragSourceIdx = null;
}

function handleCorrect(idx) {
  roundSolved = true;
  starsEarned = Math.min(starsEarned + 1, 3);

  const starEl = document.getElementById(`star${starsEarned - 1}`);
  if (starEl) starEl.classList.add('lit');

  const cards = document.querySelectorAll('.vehicle-group');
  cards[idx]?.classList.add('correct-glow');

  const target = document.getElementById('targetRing');
  target.classList.add('pulse-correct');

  const fb = document.getElementById('feedback');
  fb.textContent = '✅ Chính xác! Đây là nhóm có 9 phương tiện! 🎉';
  fb.className = 'correct';

  launchFireworks();
  launchStars();
  launchRoadCars();

  stopAllAudio();
  audioDungRoi.play().catch(e => console.log(e));

  document.getElementById('btnNext').disabled = false;
}

function handleWrong(idx) {
  const cards = document.querySelectorAll('.vehicle-group');
  const card = cards[idx];
  card?.classList.add('wrong-shake');
  setTimeout(() => card?.classList.remove('wrong-shake'), 500);

  const fb = document.getElementById('feedback');
  fb.textContent = '🤔 Con hãy đếm lại xem nhóm nào có 9 nhé!';
  fb.className = 'wrong';

  stopAllAudio();
  audioSaiRoi.play().catch(e => console.log(e));
}

// ============================================================
//  NAVIGATION
// ============================================================
function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS.length) {
    showComplete();
  } else {
    initRound();
  }
}
function resetAll() {
  currentRound = 0;
  starsEarned = 0;
  document.querySelectorAll('.star-icon').forEach(s => s.classList.remove('lit'));
  document.getElementById('overlay').classList.remove('show');
  initRound();
}
function showComplete() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('overlayEmoji').textContent = starsEarned === 3 ? '🏆' : '🎉';
  document.getElementById('overlayTitle').textContent = starsEarned === 3 ? 'Xuất sắc! 3 sao!' : 'Hoàn thành!';
  document.getElementById('overlayMsg').textContent =
    `Con đã hoàn thành tất cả 3 vòng với ${starsEarned} ⭐!`;
  document.getElementById('overlay').classList.add('show');
  
  stopAllAudio();
  audioHoanThanh.play().catch(e => console.log(e));
  
  launchFireworks(); launchFireworks();
}

// ============================================================
//  EFFECTS
// ============================================================
const EMOJIS = ['⭐','🌟','✨','💫','🎉','🎊','🌈','❤️','💛','💚','💙'];
function launchFireworks() {
  const container = document.getElementById('effects');
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = (50 + Math.random() * 40) + 'vh';
      const dx = (Math.random() - .5) * 200;
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      p.style.animationDuration = (.9 + Math.random() * .8) + 's';
      container.appendChild(p);
      setTimeout(() => p.remove(), 1800);
    }, i * 60);
  }
}
function launchStars() {
  const container = document.getElementById('effects');
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = '⭐';
      p.style.left = (20 + Math.random() * 60) + 'vw';
      p.style.top = (30 + Math.random() * 50) + 'vh';
      p.style.fontSize = (24 + Math.random() * 24) + 'px';
      p.style.setProperty('--dx', (Math.random() - .5) * 150 + 'px');
      p.style.setProperty('--rot', (Math.random() * 540) + 'deg');
      container.appendChild(p);
      setTimeout(() => p.remove(), 1800);
    }, i * 80);
  }
}
function launchRoadCars() {
  const cars = ['🚗','🚕','🏎️','🚙'];
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const car = document.createElement('div');
      car.className = 'road-car';
      car.textContent = cars[Math.floor(Math.random() * cars.length)];
      car.style.bottom = (8 + Math.random() * 10) + 'px';
      car.style.animationDuration = (1.4 + Math.random() * .8) + 's';
      document.getElementById('effects').appendChild(car);
      setTimeout(() => car.remove(), 2500);
    }, i * 400);
  }
}

// ============================================================
//  UTILS
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
//  START
// ============================================================
initRound();
</script>
